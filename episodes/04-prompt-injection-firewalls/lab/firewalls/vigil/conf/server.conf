# Vigil config for the EP04 lab — TRANSFORMER + YARA scanning only.
#
# The vectordb scanner is NOT in input_scanners: seeding a Chroma DB whose
# embeddings match the embedding model can't be done offline in this lab, so we
# run a reduced (weaker-than-default) scanner set and say so in the write-up
# rather than pretending we ran the full thing.
#
# BUT: Vigil.__init__ ALWAYS calls _initialize_vectordb(), even when vectordb is
# disabled as a scanner. Omitting [scanner:vectordb] therefore kills startup with
#   TypeError: VectorDB.__init__() missing 3 required positional arguments:
#   'collection', 'db_dir', and 'n_results'
# So the section below MUST exist with all required keys. The DB is created empty
# and never scanned against.

[main]
use_cache = true
cache_max = 500

[embedding]
auto_update = false
update_threshold = 3
model = sentence-transformers/all-MiniLM-L6-v2

[scanners]
input_scanners = transformer,yara
output_scanners =

[scanner:yara]
rules_dir = /opt/vigil-llm/data/yara

# Required for construction only — vectordb is not an active input scanner.
[scanner:vectordb]
collection = data-openai
threshold = 0.4
db_dir = /app/data/vdb
n_results = 5

[scanner:transformer]
model = deepset/deberta-v3-base-injection
threshold = 0.98
